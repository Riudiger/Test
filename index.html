<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apartamento Zona Sul SP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f172a;
  color: #fff;
}

/* HERO */
.header {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1560185007-c5ca9d2c014d') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.header h1 {
  font-size: 48px;
  animation: fadeUp 1s ease forwards;
}

.header p {
  margin: 20px 0;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.3s;
}

.btn {
  background: linear-gradient(135deg, #00c896, #00a86b);
  padding: 15px 30px;
  border-radius: 50px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  display: inline-block;
  transition: 0.3s;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
  animation-delay: 0.6s;
}

.btn:hover {
  transform: scale(1.05);
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
}

/* ANIMAÇÃO SCROLL */
.hidden {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  flex: 1;
  background: #1e293b;
  padding: 25px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* GALERIA */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.07);
}

/* ANIMAÇÃO */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<!-- HERO -->
<div class="header">
  <div>
    <h1>Apartamento Zona Sul São Paulo</h1>
    <p>Conforto, localização e valorização</p>
    <a href="https://wa.me/SEUNUMERO" class="btn">Falar no WhatsApp</a>
  </div>
</div>

<!-- BENEFÍCIOS -->
<div class="section hidden">
  <h2>Diferenciais</h2>
  <br><br>
  <div class="cards">
    <div class="card">📍 Localização estratégica</div>
    <div class="card">🔐 Segurança 24h</div>
    <div class="card">💰 Excelente investimento</div>
  </div>
</div>

<!-- GALERIA -->
<div class="section hidden">
  <h2>Veja o imóvel</h2>
  <br><br>

  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1501183638710-841dd1904471">
    <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
    <img src="https://images.unsplash.com/photo-1560184897-ae75f418493e">
    <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
  </div>
</div>

<!-- DETALHES -->
<div class="section hidden">
  <h2>Detalhes do imóvel</h2>
  <br>
  <p>• 2 dormitórios</p>
  <p>• 1 vaga</p>
  <p>• Lazer completo</p>
</div>

<!-- CTA -->
<div class="section hidden" style="text-align:center;">
  <h2>Agende sua visita</h2>
  <br>
  <a href="https://wa.me/SEUNUMERO" class="btn">Chamar agora</a>
</div>

<script>
// animação ao rolar
const elements = document.querySelectorAll('.hidden');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
